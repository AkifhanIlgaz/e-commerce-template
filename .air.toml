#:schema https://json.schemastore.org/any.json

env_files = []
root = "."
testdata_dir = "testdata"
tmp_dir = "tmp"

[build]
  args_bin = []
  bin = "./tmp/main"
  # templ generate önce çalışır, sonra binary derlenir
  cmd = "templ generate && go build -o ./tmp/main ./cmd/server"
  delay = 200
  entrypoint = ["./tmp/main"]
  exclude_dir = ["assets", "tmp", "bin", "vendor", "testdata", "static"]
  exclude_file = []
  # templ'in ürettiği *_templ.go dosyaları izlenmez (sonsuz rebuild döngüsü olmasın)
  exclude_regex = ["_test.go", "_templ\\.go$"]
  exclude_unchanged = false
  follow_symlink = false
  full_bin = ""
  ignore_dangerous_root_dir = false
  include_dir = []
  # css: theme.css Go embed ile gömüldüğü için değişince rebuild gerekir
  include_ext = ["go", "templ", "css"]
  include_file = []
  kill_delay = "500ms"
  log = "build-errors.log"
  poll = false
  poll_interval = 0
  post_cmd = []
  pre_cmd = []
  rerun = false
  rerun_delay = 500
  send_interrupt = true
  stop_on_error = false

[color]
  app = ""
  build = "yellow"
  main = "magenta"
  mode = ""
  runner = "green"
  watcher = "cyan"

[log]
  main_only = false
  silent = false
  time = false

[misc]
  clean_on_exit = false

[proxy]
  app_port = 0
  app_start_timeout = 0
  enabled = false
  proxy_port = 0

[screen]
  clear_on_rebuild = false
  keep_scroll = true
